function orCombine(p) { return 1 - p.reduce((a, v) => a * (1 - v), 1); }
function andCombine(p) { return p.reduce((a, v) => a * v, 1); }
function riskColor(v) { return v > .30 ? "#991B1B" : v > .15 ? "#92400E" : v > .05 ? "#78350F" : "#064E3B"; }
function pct(v, d = 0) { return `${(v * 100).toFixed(d)}%`; }
function clamp01(v) { return Math.max(0, Math.min(1, v)); }
function format_list(items) {
  if (!items.length) return "";
  if (items.length === 1) return items[0];
  if (items.length === 2) return `${items[0]} and ${items[1]}`;
  return `${items.slice(0, -1).join(", ")}, and ${items[items.length - 1]}`;
}
function is_uncertain_value(v) { return v >= 0.35 && v <= 0.65; }

// ─── Computation layer: model output, sensitivity, drivers, cruxes ───
function get_sub_score_from_model(model, sub) {
  const hasTier3 = sub.tier3 && sub.tier3.length > 0;
  const mode = model.t2Mode[sub.id] || "direct";
  if (mode === "breakdown" && hasTier3 && model.t3[sub.id]) return orCombine(model.t3[sub.id]);
  return model.t2[sub.id] ?? 0;
}

function get_branch_score_from_model(model, branch) {
  if ((model.branchMode[branch.key] || "direct") !== "expand") return model.direct[branch.key] ?? 0;
  const subScores = branch.tier2.map(sub => get_sub_score_from_model(model, sub));
  return branch.gate === "AND" ? andCombine(subScores) : orCombine(subScores);
}

function compute_model_output(model) {
  const step_values = BRANCHES.map(branch => get_branch_score_from_model(model, branch));
  const p_doom = step_values.reduce((acc, val) => acc * val, 1);
  return { step_values, p_doom };
}

function compute_step_perturbed_p_doom(step_values, index, next_value) {
  return step_values.reduce((acc, val, i) => acc * (i === index ? next_value : val), 1);
}

function calculate_perturbation_effect(base_p_doom, p_down, p_up, current_value, down_value, up_value) {
  const delta_down = p_down - base_p_doom;
  const delta_up = p_up - base_p_doom;
  const effect = (Math.abs(delta_down) + Math.abs(delta_up)) / 2;
  const swing = Math.abs(p_up - p_down);
  const avg_shift = ((up_value - current_value) + (current_value - down_value)) / 2;
  const sensitivity_per_point = avg_shift > 0 ? effect / avg_shift : 0;
  return { delta_down, delta_up, effect, swing, sensitivity_per_point };
}

function build_active_subnode_inputs(model) {
  const inputs = [];
  BRANCHES.forEach(branch => {
    if ((model.branchMode[branch.key] || "direct") !== "expand") return;
    branch.tier2.forEach(sub => {
      const hasTier3 = sub.tier3 && sub.tier3.length > 0;
      const mode = model.t2Mode[sub.id] || "direct";
      if (hasTier3 && mode === "breakdown") {
        const values = model.t3[sub.id] || sub.tier3.map(() => 0);
        sub.tier3.forEach((node, index) => {
          inputs.push({
            id: `t3:${sub.id}:${node.id}`,
            short_label: node.label,
            label: `${branch.label} · ${sub.label} · ${node.label}`,
            level: "subnode",
            source: "tier3",
            current_value: values[index] ?? 0,
            sub_id: sub.id,
            tier3_index: index,
          });
        });
      } else {
        inputs.push({
          id: `t2:${sub.id}`,
          short_label: sub.label,
          label: `${branch.label} · ${sub.label}`,
          level: "subnode",
          source: "tier2",
          current_value: model.t2[sub.id] ?? 0,
          sub_id: sub.id,
          tier3_index: null,
        });
      }
    });
  });
  return inputs;
}

function apply_input_value(model, input, next_value) {
  const safe = clamp01(next_value);
  if (input.source === "tier2") {
    return { ...model, t2: { ...model.t2, [input.sub_id]: safe } };
  }
  if (input.source === "tier3") {
    const currentArray = model.t3[input.sub_id] || [];
    const nextArray = currentArray.slice();
    nextArray[input.tier3_index] = safe;
    return { ...model, t3: { ...model.t3, [input.sub_id]: nextArray } };
  }
  return model;
}

function compute_sensitivity_report(model, opts = {}) {
  const delta = clamp01(opts.delta ?? 0.05);
  const include_subnodes = opts.include_subnodes ?? true;
  const base = compute_model_output(model);
  const rows = [];

  BRANCHES.forEach((branch, index) => {
    const current_value = base.step_values[index];
    const down_value = clamp01(current_value - delta);
    const up_value = clamp01(current_value + delta);
    const p_down = compute_step_perturbed_p_doom(base.step_values, index, down_value);
    const p_up = compute_step_perturbed_p_doom(base.step_values, index, up_value);
    const stats = calculate_perturbation_effect(base.p_doom, p_down, p_up, current_value, down_value, up_value);
    rows.push({
      id: `branch:${branch.key}`,
      short_label: branch.label,
      label: branch.label,
      level: "top_level",
      source: "branch",
      current_value,
      down_value,
      up_value,
      p_down,
      p_up,
      ...stats,
    });
  });

  if (include_subnodes) {
    const inputs = build_active_subnode_inputs(model);
    inputs.forEach(input => {
      const down_value = clamp01(input.current_value - delta);
      const up_value = clamp01(input.current_value + delta);

      const down_model = apply_input_value(model, input, down_value);
      const up_model = apply_input_value(model, input, up_value);
      const p_down = compute_model_output(down_model).p_doom;
      const p_up = compute_model_output(up_model).p_doom;
      const stats = calculate_perturbation_effect(base.p_doom, p_down, p_up, input.current_value, down_value, up_value);

      rows.push({
        ...input,
        down_value,
        up_value,
        p_down,
        p_up,
        ...stats,
      });
    });
  }

  const ranked = rows.sort((a, b) => b.effect - a.effect);
  return {
    delta,
    base_p_doom: base.p_doom,
    assumptions: ranked,
    top_level_assumptions: ranked.filter(row => row.level === "top_level"),
    subnode_assumptions: ranked.filter(row => row.level === "subnode"),
  };
}

function summarize_driving_assumptions(sensitivity_report, top_n = 3) {
  const items = sensitivity_report.assumptions.slice(0, top_n);
  if (!items.length) return { items: [], sentence: "No assumptions available yet." };
  return {
    items,
    sentence: `Your result is most influenced by ${format_list(items.map(item => item.short_label || item.label))}.`,
  };
}

function compute_crux_view(sensitivity_report, opts = {}) {
  const top_n = opts.top_n ?? 3;
  const debate_flags = opts.debate_flags || {};
  const comparison_profile = opts.comparison_profile || null;
  const material_difference = opts.material_difference ?? 0.10;
  const ranked = sensitivity_report.assumptions;
  if (!ranked.length) return { mode: comparison_profile ? "comparison" : "single_profile", items: [], sentence: "No cruxes available yet." };

  if (comparison_profile && comparison_profile.values) {
    const candidates = ranked
      .map(item => {
        const other_value = comparison_profile.values[item.id];
        if (typeof other_value !== "number") return null;
        const disagreement = Math.abs(item.current_value - clamp01(other_value));
        const disagreement_impact = disagreement * item.sensitivity_per_point;
        return {
          ...item,
          other_value: clamp01(other_value),
          disagreement,
          disagreement_impact,
          crux_score: disagreement_impact,
          reason: `Profiles differ by ${pct(disagreement, 1)} on this assumption.`,
        };
      })
      .filter(Boolean);

    if (!candidates.length) return { mode: "comparison", items: [], sentence: "No comparable assumptions yet." };

    const maxImpact = Math.max(...candidates.map(c => c.disagreement_impact), 0);
    const filtered = candidates
      .filter(c => c.disagreement >= material_difference && c.disagreement_impact >= maxImpact * 0.35)
      .sort((a, b) => b.crux_score - a.crux_score);
    const items = (filtered.length ? filtered : candidates.sort((a, b) => b.crux_score - a.crux_score)).slice(0, top_n);
    return {
      mode: "comparison",
      items,
      sentence: `The biggest disagreement-sensitive assumptions are ${format_list(items.map(item => item.short_label || item.label))}.`,
    };
  }

  const maxEffect = ranked[0].effect || 0;
  const candidates = ranked
    .map(item => {
      const flagged = !!debate_flags[item.id];
      const uncertain = is_uncertain_value(item.current_value);
      const high_impact = item.effect >= maxEffect * 0.35;
      const is_candidate = high_impact && (flagged || uncertain);
      return {
        ...item,
        flagged,
        uncertain,
        high_impact,
        is_candidate,
        crux_score: item.effect * (1 + (flagged ? 0.5 : 0) + (uncertain ? 0.2 : 0)),
        reason: uncertain
          ? `High impact and currently in an uncertainty-heavy range (${pct(item.current_value, 0)}).`
          : "High impact assumption where disagreement would materially shift the result.",
      };
    })
    .filter(item => item.is_candidate)
    .sort((a, b) => b.crux_score - a.crux_score);

  const fallback = ranked.slice(0, top_n).map(item => ({
    ...item,
    flagged: !!debate_flags[item.id],
    uncertain: is_uncertain_value(item.current_value),
    reason: `Top sensitivity assumption; a 10-point disagreement would move p(doom) materially.`,
  }));
  const items = (candidates.length ? candidates : fallback).slice(0, top_n);
  return {
    mode: "single_profile",
    items,
    sentence: `Cruxes are assumptions where reasonable disagreement would meaningfully move p(doom). The most likely cruxes are ${format_list(items.map(item => item.short_label || item.label))}.`,
  };
}

// ═══ Editable text component ═══
function EditableText({ text, onEdit, style }) {
  return (
    <div
      contentEditable
      suppressContentEditableWarning
      onBlur={e => {
        const newText = e.target.innerText.trim();
        if (newText !== text) onEdit(newText);
      }}
      style={{
        ...style,
        outline: "none",
        borderRadius: 3,
        padding: "2px 0",
        transition: "background 0.2s",
        cursor: "text",
      }}
      onFocus={e => { e.target.style.background = ACCENT_LIGHT; }}
      onMouseOver={e => { if (document.activeElement !== e.target) e.target.style.background = `${ACCENT_LIGHT}80`; }}
      onMouseOut={e => { if (document.activeElement !== e.target) e.target.style.background = "transparent"; }}
      onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); e.target.blur(); } }}
    >
      {text}
    </div>
  );
}

function Slider({ value, onChange, disabled, color = ACCENT }) {
  const pct = Math.round(value * 100);
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 14, opacity: disabled ? 0.45 : 1 }}>
      <div style={{ flex: 1, position: "relative", height: 30, display: "flex", alignItems: "center" }}>
        <div style={{ width: "100%", height: 6, borderRadius: 999, background: TRACK_OFF }} />
        <div style={{
          position: "absolute",
          left: 0,
          width: `${pct}%`,
          height: 6,
          borderRadius: 999,
          background: disabled ? TRACK_OFF : `linear-gradient(90deg, ${color}, ${color}CC)`,
          transition: "width 100ms ease"
        }} />
        {!disabled && <div style={{
          position: "absolute",
          left: `calc(${pct}% - 9px)`,
          width: 18,
          height: 18,
          borderRadius: "50%",
          background: CARD,
          border: `2.5px solid ${color}`,
          boxShadow: `0 5px 14px ${color}33`,
          transition: "left 100ms ease",
          pointerEvents: "none",
          zIndex: 1
        }} />}
        <input type="range" min="0" max="100" step="1" value={pct}
          onChange={e => !disabled && onChange(parseInt(e.target.value) / 100)}
          disabled={disabled}
          style={{ position: "absolute", inset: 0, width: "100%", height: "100%", appearance: "none", background: "transparent", cursor: disabled ? "not-allowed" : "pointer", margin: 0, opacity: 0, zIndex: 2 }}
        />
      </div>
      <span style={{
        fontFamily: MONO,
        fontSize: 14,
        fontWeight: 700,
        color: disabled ? MUTED : color,
        minWidth: 56,
        textAlign: "center",
        padding: "5px 8px",
        borderRadius: 999,
        border: `1px solid ${disabled ? BORDER : `${color}55`}`,
        background: disabled ? SURFACE : `${color}10`
      }}>{pct}%</span>
    </div>
  );
}

function Tier3Panel({ tier3, scores, onChange, qEdits, onEditQ, color }) {
  const orScore = orCombine(scores);
  return (
    <div style={{ marginTop: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <span style={{ fontSize: 12, color: MUTED, letterSpacing: 0.5 }}>{tier3.length} sub-questions · OR-combined</span>
        <span style={{ fontFamily: MONO, fontSize: 13, fontWeight: 700, color, padding: "3px 8px", borderRadius: 999, background: `${color}14`, border: `1px solid ${color}35` }}>{(orScore*100).toFixed(0)}%</span>
      </div>
      {tier3.map((node, i) => (
        <div key={node.id} style={{ marginBottom: 12, padding: "11px 10px", borderRadius: 10, border: `1px solid ${BORDER}`, background: CARD }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
            <span style={{ fontFamily: MONO, fontSize: 11, fontWeight: 700, color, background: `${color}14`, border: `1px solid ${color}35`, padding: "3px 8px", borderRadius: 999 }}>{node.id}</span>
            <span style={{ fontSize: 13, fontWeight: 600, color: TEXT }}>{node.label}</span>
          </div>
          <EditableText
            text={qEdits[node.id] || node.q}
            onEdit={v => onEditQ(node.id, v)}
            style={{ fontSize: 13, color: TEXT2, lineHeight: 1.65, marginBottom: 10 }}
          />
          <Slider value={scores[i]} onChange={v => onChange(i, v)} color={color} />
          {i < tier3.length - 1 && <div style={{ height: 1, background: RULE, marginTop: 12, opacity: 0.5 }} />}
        </div>
      ))}
    </div>
  );
}

function Tier2Sub({ sub, directScore, onDirectChange, tier3Scores, onTier3Change, mode, onToggleMode, qEdits, onEditQ, color }) {
  const hasTier3 = sub.tier3 && sub.tier3.length > 0;
  const effectiveScore = mode === "breakdown" && hasTier3 ? orCombine(tier3Scores) : directScore;

  return (
    <div style={{ marginBottom: 14, padding: "12px 10px", borderRadius: 12, border: `1px solid ${BORDER}`, background: CARD }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
        <span style={{ fontSize: 14, fontWeight: 700, color: TEXT }}>{sub.label}</span>
        <span style={{ fontFamily: MONO, fontSize: 14, fontWeight: 700, color, padding: "3px 8px", borderRadius: 999, border: `1px solid ${color}40`, background: `${color}12` }}>{(effectiveScore*100).toFixed(0)}%</span>
      </div>
      <EditableText
        text={qEdits[sub.id] || sub.q}
        onEdit={v => onEditQ(sub.id, v)}
        style={{ fontSize: 13, color: TEXT2, lineHeight: 1.65, marginBottom: 12 }}
      />

      {mode === "direct" && <Slider value={directScore} onChange={onDirectChange} color={color} />}
      {mode === "breakdown" && <Slider value={effectiveScore} onChange={() => {}} disabled color={color} />}

      {hasTier3 && (
        <div style={{ marginTop: 10 }}>
          <span onClick={onToggleMode} style={{
            fontSize: 13, fontWeight: 700, color: ACCENT, cursor: "pointer",
            textDecoration: "underline", textDecorationColor: `${ACCENT}55`, textUnderlineOffset: 3
          }}>{mode === "breakdown" ? "Score directly instead" : "Break it down"}</span>
        </div>
      )}

      {!hasTier3 && (
        <div style={{ marginTop: 8, fontSize: 12, color: MUTED, fontStyle: "italic" }}>Sub-questions to be developed</div>
      )}

      {mode === "breakdown" && hasTier3 && (
        <div style={{ marginLeft: 8, paddingLeft: 12, borderLeft: `2px solid ${RULE}`, marginTop: 14 }}>
          <Tier3Panel tier3={sub.tier3} scores={tier3Scores} onChange={onTier3Change} qEdits={qEdits} onEditQ={onEditQ} color={color} />
        </div>
      )}

      <div style={{ height: 1, background: RULE, marginTop: 14 }} />
    </div>
  );
}

function App() {

  const [showSetup, setShowSetup] = useState(true);

  const [driverFilter, setDriverFilter] = useState("all");

  const [t3, setT3] = useState(DEFAULT_T3);

  const comparisonProfile = null;

  const setT2Score = useCallback((id, v) => setT2(p => ({ ...p, [id]: v })), []);

  const resetAllInputs = useCallback(() => {

    setTimeHorizon(30);

    setDirect({ ...DEFAULT_DIRECT });
    setT2({ ...DEFAULT_T2 });
    setT2Mode({ ...DEFAULT_T2_MODE });
    setT3({

    setDriverFilter("all");
  }, []);

  const model = useMemo(() => ({ branchMode, direct, t2, t2Mode, t3 }), [branchMode, direct, t2, t2Mode, t3]);
  const modelOutput = useMemo(() => compute_model_output(model), [model]);
  const stepVals = modelOutput.step_values;
  const pDoom = modelOutput.p_doom;
  const sensitivityReport = useMemo(
    () => compute_sensitivity_report(model, { delta: 0.05, include_subnodes: true }),
    [model]
  );
  const drivingSummary = useMemo(
    () => summarize_driving_assumptions(sensitivityReport, 3),
    [sensitivityReport]
  );
  const cruxView = useMemo(
    () => compute_crux_view(sensitivityReport, { debate_flags: {}, comparison_profile: comparisonProfile, top_n: 3 }),
    [sensitivityReport, comparisonProfile]
  );
  const maxSensitivityEffect = sensitivityReport.assumptions[0]?.effect || 0;
  const visibleDrivers = useMemo(() => {
    if (driverFilter === "top_level") return sensitivityReport.top_level_assumptions;
    if (driverFilter === "subnode") return sensitivityReport.subnode_assumptions;
    return sensitivityReport.assumptions;
  }, [driverFilter, sensitivityReport]);

  const rc = riskColor(pDoom);
  const branch = BRANCHES[step];
  const expanded = branchMode[branch.key] === "expand";

    }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

          .ux-main { padding: 20px 16px !important; border-radius: 18px !important; }
        }
      `}</style>

      <div className="ux-shell" style={{ maxWidth: 940, margin: "0 auto", padding: "36px 20px 52px" }}>
        <div className="ux-main" style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 24, boxShadow: SHADOW, padding: "34px 30px 34px" }}>

                <span style={{ fontFamily: MONO, fontSize: 15, color: rc, fontWeight: 700 }}>{pct(pDoom, 1)}</span>

                <span style={{ fontSize: 11, color: TEXT2 }}>{timeHorizon}-year horizon</span>

            </div>

            <h1 style={{ fontSize: 31, lineHeight: 1.12, fontWeight: 800, margin: 0, color: TEXT }}>AI Existential Risk Calculator</h1>
            <div style={{ fontSize: 15, color: TEXT2, lineHeight: 1.65, marginTop: 12, maxWidth: 760 }}>

                      {visibleDrivers.slice(0, 6).map((item, idx) => {
                        const effectShare = maxSensitivityEffect > 0 ? (item.effect / maxSensitivityEffect) * 100 : 0;
                        return (
                          <div key={item.id} style={{ borderRadius: 10, border: `1px solid ${BORDER}`, background: CARD, padding: "9px 10px" }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 10, flexWrap: "wrap" }}>
                              <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                                <span style={{ fontFamily: MONO, fontSize: 11, fontWeight: 700, color: MUTED }}>#{idx + 1}</span>
                                <span style={{ fontSize: 13, fontWeight: 700, color: TEXT }}>{item.label}</span>
                                <span style={{ fontSize: 11, color: MUTED }}>
                                  {item.level === "top_level" ? "Top-level" : "Subnode"}
                                </span>
                              </div>
                              <span style={{ fontFamily: MONO, fontSize: 12, color: TEXT }}>
                                impact {pct(item.effect, 2)}
                              </span>
                            </div>

                            <div style={{ marginTop: 7, height: 6, borderRadius: 999, background: TRACK_OFF, overflow: "hidden" }}>
                              <div style={{ height: "100%", width: `${effectShare}%`, background: "linear-gradient(90deg, #1D4ED8, #9333EA)", borderRadius: 999 }} />
                            </div>

                            <div style={{ marginTop: 6, fontSize: 12, color: TEXT2 }}>
                              Moving this assumption by +/-5pp changes p(doom) by about +/-{pct(item.effect, 2)}.
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    {!visibleDrivers.length && (
                      <div style={{ fontSize: 12, color: TEXT2 }}>No assumptions match this filter.</div>
                    )}
                  </div>
                )}
              </div>

              {/* Crux view */}
              <div style={{ borderRadius: 12, border: `1px solid ${BORDER}`, background: SURFACE, padding: "12px 12px" }}>
                <button
                  className="ux-toggle-btn"
                  onClick={() => setCruxOpen(!cruxOpen)}
                  aria-expanded={cruxOpen}
                  aria-controls="crux-panel"
                  style={{ marginBottom: cruxOpen ? 6 : 0 }}
                >
                  <span style={{ fontSize: 14, fontWeight: 800, color: TEXT }}>Crux View</span>
                  <span style={{ fontSize: 14, color: MUTED, transform: cruxOpen ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s" }}>▾</span>
                </button>
                {cruxOpen && (
                  <div id="crux-panel">
                    <div style={{ fontSize: 13, color: TEXT2, lineHeight: 1.6, marginBottom: 9 }}>
                      {cruxView.sentence}
                    </div>
                    <div style={{ fontSize: 12, color: TEXT2, lineHeight: 1.55, marginBottom: 8 }}>
                      Read this as: if two users disagree on one of these assumptions, their final p(doom) will likely diverge the most.
                    </div>
                    <div style={{ display: "grid", gap: 8 }}>
                      {cruxView.items.map(item => (
                        <div key={`crux-${item.id}`} style={{ borderRadius: 10, border: `1px solid ${BORDER}`, background: CARD, padding: "8px 10px" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", gap: 8, alignItems: "baseline", flexWrap: "wrap" }}>
                            <span style={{ fontSize: 13, fontWeight: 700, color: TEXT }}>{item.short_label || item.label}</span>
                            <span style={{ fontFamily: MONO, fontSize: 12, fontWeight: 700, color: "#7C2D12" }}>
                              impact {pct(item.effect, 2)}
                            </span>
                          </div>
                          <div style={{ marginTop: 4, fontSize: 12, color: TEXT2 }}>
                            {item.reason}
                          </div>
                          <div style={{ marginTop: 3, fontSize: 12, color: MUTED }}>
                            If users differ by 10 points here, p(doom) shifts by about {pct(item.sensitivity_per_point * 0.10, 2)}.
                          </div>
                        </div>
                      ))}
                    </div>
                    <div style={{ marginTop: 8, fontSize: 12, color: MUTED }}>
                      Candidate cruxes are selected by impact first, then uncertainty/disagreement-likelihood.
                    </div>
                  </div>
                )}
              </div>

              {/* Reserved for future extension */}
              <div style={{ borderRadius: 12, border: `1px dashed ${BORDER}`, background: `${SURFACE}AA`, padding: "10px 12px" }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: MUTED, textTransform: "uppercase", letterSpacing: 0.8 }}>Model Coverage / Unmodeled Risk</div>
                <div style={{ fontSize: 12, color: TEXT2, marginTop: 3 }}>
                  Reserved space for future diagnostics.
                </div>
              </div>
            </div>
          </div>

          {/* Methodology */}
          <div style={{ marginTop: 20, borderRadius: 14, border: `1px solid ${BORDER}`, background: SURFACE, padding: "12px 14px" }}>
            <button
              className="ux-toggle-btn"
              onClick={() => setNotesOpen(!notesOpen)}
              aria-expanded={notesOpen}
              aria-controls="methodology-panel"
            >
              <span style={{ fontSize: 13, fontWeight: 700, color: MUTED, letterSpacing: 0.6 }}>Methodology</span>
              <span style={{ fontSize: 14, color: MUTED, transform: notesOpen ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s" }}>▾</span>
            </button>
            {notesOpen && (
              <div id="methodology-panel" style={{ fontSize: 13, color: TEXT2, lineHeight: 1.7, paddingTop: 10 }}>
                <p style={{ marginBottom: 10 }}><strong style={{ color: TEXT }}>Conditional decomposition.</strong> This follows the structure of Carlsmith (2022) and related threat models: factor P(existential catastrophe from AI) into a product of conditional probabilities, where each step assumes all prior steps obtain. This avoids double-counting and isolates genuine disagreement to the step where it occurs.</p>
                <p style={{ marginBottom: 10 }}><strong style={{ color: TEXT }}>Three-tier scoring.</strong> Each branch can be scored directly (Tier 1), broken into sub-branches (Tier 2), or decomposed further into sub-questions where available (Tier 3). The scoring depth you choose determines how the branch probability is computed.</p>
                <p style={{ marginBottom: 10 }}><strong style={{ color: TEXT }}>Gate logic.</strong> Intelligence sub-branches are AND-combined (all conditions required). Alignment, Influence, and Environment sub-branches are OR-combined (any single pathway sufficient).</p>
                <p style={{ marginBottom: 10 }}><strong style={{ color: TEXT }}>Editable questions.</strong> All question text is editable. Click any question to revise the framing for your own threat model. Edits persist for the session.</p>
                <p style={{ marginBottom: 0 }}><strong style={{ color: TEXT }}>Precision.</strong> Treat the output as an order-of-magnitude estimate. Uncertainty in each input propagates multiplicatively, so the true credible interval is substantially wider than the point estimate displayed.</p>
              </div>
            )}
          </div>

          <div style={{ textAlign: "center", fontSize: 12, color: MUTED, marginTop: 20, lineHeight: 1.6 }}>
            4 branches · 3-tier scoring · AISC Team 19
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
    </script>
  </body>
</html>
